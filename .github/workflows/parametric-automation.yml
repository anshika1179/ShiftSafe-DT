name: ShiftSafe Parametric Automation Pipeline

on:
  schedule:
    # Runs at minute 0 past every hour (e.g., 1:00, 2:00, 3:00)
    - cron: '0 * * * *'
  
  # Allow manual triggering from the GitHub Actions tab for testing
  workflow_dispatch: 

jobs:
  trigger-oracles-and-payouts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Hit the Deployed ShiftSafe Cron Endpoint
        env:
          # These must be set securely in your GitHub Repository -> Settings -> Secrets
          PROD_URL: ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Gracefully skip if secrets are not configured on this repo
          # (Prevents failures on forks or team repos without secrets)
          if [ -z "$PROD_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "⚠️  PROD_URL or CRON_SECRET not set in this repo's Secrets — skipping automation."
            echo "   (This is expected on forks. Add secrets to enable automation.)"
            exit 0
          fi

          # Sanitize secrets: strip any invisible whitespace, newlines, carriage returns
          CLEAN_URL=$(printf '%s' "$PROD_URL" | tr -d '\n\r\t ' | sed 's/[[:space:]]//g')
          CLEAN_SECRET=$(printf '%s' "$CRON_SECRET" | tr -d '\n\r\t')

          echo "Pinging ShiftSafe Automation Engine at $CLEAN_URL"
          
          # Use curl with -L to follow any redirects (e.g., Vercel 308), GET request
          response=$(curl -L --write-out "%{http_code}" --silent --output response.txt \
            "$CLEAN_URL/api/triggers/cron" \
            -H "Authorization: Bearer $CLEAN_SECRET" \
            -H "Content-Type: application/json")

          if [ "$response" -eq 200 ]; then
            echo "✅ Automation Triggered successfully!"
            cat response.txt
          else
            echo "❌ Failed to trigger automation. HTTP Status: $response"
            cat response.txt
            exit 1
          fi
